<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:#FAF6F2;color:#2C2420;display:flex;justify-content:center;min-height:100vh;padding:60px 20px;}

<body>

</html>
